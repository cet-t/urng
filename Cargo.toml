[package]
name = "urng"
version = "0.2.6"
edition = "2024"
license = "MIT"
authors = ["cet"]
description = "Universal Random Number Generator"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1

[lib]
crate-type = ["cdylib", "rlib"]

[build-dependencies]
csbindgen = "1.9.7"

[dev-dependencies]
colored = "3.1.1"
criterion = "0.5"

[dependencies]
wide = "0.7.33"
bytemuck = "1.25.0"
rayon = "1.10"
