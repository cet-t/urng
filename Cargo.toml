[package]
name = "urng"
version = "0.4.6"
edition = "2024"
license = "MIT"
authors = ["cet"]
description = "Universal Random Number Generator"
repository = "https://github.com/cet-t/urng"

[profile.release]
opt-level = 3
lto = "fat"
codegen-units = 1

[lib]
crate-type = ["cdylib", "rlib"]

[build-dependencies]
csbindgen = "1.9.7"

[dev-dependencies]
colored = "3.1.1"
thousands = "0.2.0"
criterion = "0.5"
plotters = "0.3"
anyhow = "1"

[features]
wide = []
sampler = []
seedgen = []
testing = []

[lints.clippy]
not_unsafe_ptr_arg_deref = "allow"

[dependencies]
wide = "1.3.0"
bytemuck = "1.25"
rayon = "1.10"
paste = "1.0.15"
thiserror = "2"
